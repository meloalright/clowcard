name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REPO="${{ github.repository }}"
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu; do
            FILE="clowcard-${target}.tar.gz"
            echo "Downloading $FILE..."
            gh release download "$TAG" --repo "$REPO" --pattern "$FILE" --output "$FILE"
          done

      - name: Compute checksums
        id: sha
        run: |
          echo "darwin_x86=$(sha256sum clowcard-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_arm=$(sha256sum clowcard-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$(sha256sum clowcard-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: meloalright/homebrew-monkey-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA_DARWIN_X86: ${{ steps.sha.outputs.darwin_x86 }}
          SHA_DARWIN_ARM: ${{ steps.sha.outputs.darwin_arm }}
          SHA_LINUX_X86: ${{ steps.sha.outputs.linux_x86 }}
        run: |
          cat > Formula/clowcard.rb << 'FORMULA'
          class Clowcard < Formula
            desc "Clow card divination in your terminal"
            homepage "https://github.com/meloalright/clowcard"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/meloalright/clowcard/releases/download/vVERSION_PLACEHOLDER/clowcard-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_DARWIN_ARM_PLACEHOLDER"
              else
                url "https://github.com/meloalright/clowcard/releases/download/vVERSION_PLACEHOLDER/clowcard-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_DARWIN_X86_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/meloalright/clowcard/releases/download/vVERSION_PLACEHOLDER/clowcard-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_X86_PLACEHOLDER"
            end

            def install
              bin.install "clowcard"
            end

            test do
              assert_match "clowcard", shell_output("#{bin}/clowcard -h")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/clowcard.rb
          sed -i "s/SHA_DARWIN_ARM_PLACEHOLDER/$SHA_DARWIN_ARM/g" Formula/clowcard.rb
          sed -i "s/SHA_DARWIN_X86_PLACEHOLDER/$SHA_DARWIN_X86/g" Formula/clowcard.rb
          sed -i "s/SHA_LINUX_X86_PLACEHOLDER/$SHA_LINUX_X86/g" Formula/clowcard.rb
          sed -i 's/^          //' Formula/clowcard.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clowcard.rb
          git commit -m "Update clowcard to ${{ steps.release.outputs.version }}"
          git push
