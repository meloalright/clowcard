name: Showcase

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Random Draw
        run: ./target/release/clowcard

      - name: "01 windy"
        run: ./target/release/clowcard -i windy
      - name: "01 windy en"
        run: ./target/release/clowcard -i windy --en
